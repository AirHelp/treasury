version: "2"

run:
  timeout: 5m

linters:
  enable:
    - dupword
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
  exclusions:
    paths:
      - backend/mocks
    rules:
      # Ginkgo/Gomega idiomatically use dot imports
      - linters:
          - revive
        text: "dot-imports"
        path: "_test\\.go$"
      # Cobra command handlers must match func(cmd *cobra.Command, args []string) signature
      - linters:
          - revive
        text: "unused-parameter"
        path: "^cmd/"
      # Test mock methods must match interface signatures (ctx unused in mocks)
      - linters:
          - revive
        text: "unused-parameter"
        path: "^test/"
  settings:
    gosec:
      # G304: reading user-supplied paths is intentional in a secrets manager CLI
      # G301: 0755 directory permissions are intentional for parent dir creation
      excludes:
        - G304
        - G301
    revive:
      rules:
        # Too noisy: requires comments on all exported symbols
        - name: exported
          disabled: true
        # Too noisy: requires package-level comments on every package
        - name: package-comments
          disabled: true
        # False positives on idiomatic test package names (utils, version, etc.)
        - name: var-naming
          disabled: true

formatters:
  enable:
    - goimports

