run:
  timeout: 5m

linters:
  enable:
    - dupword
    - errcheck
    - gocritic
    - goimports
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused

issues:
  exclude-dirs:
    - backend/mocks
  exclude-rules:
    # Ginkgo/Gomega idiomatically use dot imports
    - linters:
        - revive
      text: "dot-imports"
      path: _test\.go
    # Cobra command handlers must match func(cmd *cobra.Command, args []string) signature
    - linters:
        - revive
      text: "unused-parameter"
      path: cmd/
    # Test mock methods must match interface signatures (ctx unused in mocks)
    - linters:
        - revive
      text: "unused-parameter"
      path: test/
